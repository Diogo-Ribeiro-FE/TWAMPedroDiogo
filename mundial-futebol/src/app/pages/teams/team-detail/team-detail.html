<div class="container mt-4">
  @if (team) {
    <div class="card">
      <div class="card-body">
        <div class="d-flex align-items-center mb-3">
          <img [src]="team.flagUrl" width="60" class="me-3" alt="bandeira">
          <h2 class="mb-0">{{ team.country }}</h2>
        </div>

        <p><strong>Confederação:</strong> {{ team.confederation }}</p>
        <p><strong>Selecionador:</strong> {{ team.coach }}</p>
        <p><strong>Ranking FIFA:</strong> {{ team.fifaRanking }}</p>

        <div class="mt-3">
          <a [routerLink]="['/teams/edit', team.id]" class="btn btn-warning me-2">Editar</a>
          <button (click)="deleteTeam()" class="btn btn-danger me-2">Remover</button>
          <a routerLink="/teams" class="btn btn-secondary">Voltar</a>
        </div>
      </div>
    </div>
  } @else {
    <p>A carregar...</p>
  }
</div>
