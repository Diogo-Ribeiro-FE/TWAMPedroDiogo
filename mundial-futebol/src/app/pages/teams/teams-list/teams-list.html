<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Seleções Nacionais</h2>
    <a routerLink="/teams/new" class="btn btn-success">+ Nova Seleção</a>
  </div>

  <table class="table table-striped">
    <thead>
      <tr>
        <th>Bandeira</th>
        <th>País</th>
        <th>Confederação</th>
        <th>Selecionador</th>
        <th>Ranking FIFA</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      @for (team of teams; track team.id) {
        <tr>
          <td><img [src]="team.flagUrl" width="40" alt="bandeira"></td>
          <td>{{ team.country }}</td>
          <td>{{ team.confederation }}</td>
          <td>{{ team.coach }}</td>
          <td>{{ team.fifaRanking }}</td>
          <td>
            <a [routerLink]="['/teams', team.id]" class="btn btn-info btn-sm me-1">Ver</a>
            <a [routerLink]="['/teams/edit', team.id]" class="btn btn-warning btn-sm me-1">Editar</a>
            <button (click)="deleteTeam(team.id!)" class="btn btn-danger btn-sm">Remover</button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
